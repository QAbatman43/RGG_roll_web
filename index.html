<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>RGGWebrefactoring</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

html, body {
	width: 100%;
	height: 100%;
}

body {
	color: white;
	background: #242424;
	overflow: hidden;
	touch-action: none;
	font-family: "Noto Sans", Arial, sans-serif;
}

#canvas {
	display: block;
	width: 100%;
	height: 100%;
}

#canvas:focus {
	outline: none;
}

#status {
	position: fixed;
	inset: 0;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	gap: 2rem;
	background: #242424;
}

#status-splash {
	width: min(58vmin, 440px);
	max-width: 82vw;
	max-height: 60vh;
	object-fit: contain;
	image-rendering: auto;
}

#status-progress {
	width: min(82vw, 820px);
	height: 12px;
	accent-color: #d6362b;
}

#status-notice {
	display: none;
	max-width: min(82vw, 820px);
	padding: 1rem 1.2rem;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	background: #5b3943;
	color: #e0e0e0;
	text-align: center;
	line-height: 1.35;
}
		</style>
		<link rel="icon" type="image/png" href="rggweb.png" />
		<link rel="apple-touch-icon" href="rggweb.png" />
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="rggweb.icon.png" />
<link rel="apple-touch-icon" href="rggweb.apple-touch-icon.png"/>

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" src="rggweb.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="rggweb.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"rggweb","experimentalVK":false,"fileSizes":{"rggweb.pck":36568436,"rggweb.wasm":37695054},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById("status");
	const statusProgress = document.getElementById("status-progress");
	const statusNotice = document.getElementById("status-notice");

	function showNotice(text) {
		statusProgress.style.display = "none";
		statusNotice.style.display = "block";
		statusNotice.textContent = text;
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			showNotice(err.message);
		} else if (typeof err === "string") {
			showNotice(err);
		} else {
			showNotice("An unknown error occurred.");
		}
	}

	engine.startGame({
		onProgress: function (current, total) {
			if (current > 0 && total > 0) {
				statusProgress.value = current;
				statusProgress.max = total;
			} else {
				statusProgress.removeAttribute("value");
				statusProgress.removeAttribute("max");
			}
		},
	}).then(function () {
		statusOverlay.remove();
	}, displayFailureNotice);
}());
		</script>
	</body>
</html>
